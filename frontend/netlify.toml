[build]
  command = "npm run build"
  publish = "dist"

# 1. Exception for Google Search Console Verification
[[redirects]]
  from = "/google638affbbb9ec3c1f.html"
  to = "/google638affbbb9ec3c1f.html"
  status = 200

# 2. Global 301 Redirect for everything else
[[redirects]]
  from = "https://chicken-master.netlify.app/*"
  to = "https://chickenmasterps.com/:splat"
  status = 301
  force = true


[[redirects]]
  from = "/admin/*"
  to = "/admin.html"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin.html"
  status = 200
