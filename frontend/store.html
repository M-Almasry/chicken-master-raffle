    }

    /* Decoration pattern behind menu */
    .menu-section::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(to bottom, rgba(0, 0, 0, 0.9), rgba(0, 0, 0, 0.95)), url('images/interior_vintage.png');

      background-position: center;

      pointer-events: none;
    }

    .menu-section.menu-empty::before {
      background: #000;
      opacity: 1;
    }

    .menu-category {
      margin-bottom: 5rem;
      position: relative;
      z-index: 2;
    }

    .menu-grid {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    @media (min-width: 992px) {
      .menu-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
        gap: 2.5rem;
      }
    }

    .menu-item {
      background: rgba(30, 30, 30, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(212, 160, 23, 0.15);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    .menu-item:hover {
      transform: translateY(-8px);
      border-color: var(--color-gold);
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.6);
      background: rgba(40, 40, 40, 0.8);
    }

    .item-image {
      height: 220px;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
      position: relative;
      overflow: hidden;
    }

    /* Add a subtle glow effect to placeholder icons */
    .item-image i {
      filter: drop-shadow(0 0 15px rgba(212, 160, 23, 0.2));
      transition: 0.5s;
    }

    .menu-item:hover .item-image i {
      transform: scale(1.1);
      filter: drop-shadow(0 0 25px rgba(212, 160, 23, 0.5));
      color: var(--color-gold);
    }

    .item-content {
      padding: 1.8rem;
      flex-grow: 1;
      display: flex;
      flex-direction: column;
    }

    .item-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 0.8rem;
    }

    .category-title {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      color: #fff;
      margin-bottom: 2.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      text-transform: capitalize;
    }

    .category-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, var(--color-gold), transparent);
    }

    .item-title {
      color: #fff;
      font-size: 1.4rem;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      margin: 0;
      transition: 0.3s;
      letter-spacing: -0.02em;
    }

    .menu-item:hover .item-title {
      color: var(--color-gold);
    }

    .item-desc {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
      line-height: 1.7;
      margin-bottom: 1.5rem;
      flex-grow: 1;
      font-family: 'Inter', sans-serif;
    }

    .btn-add {
      width: 100%;
      padding: 1rem;
      background: linear-gradient(45deg, transparent 50%, var(--color-gold) 50%);
      background-size: 250%;
      background-position: left bottom;
      border: 1px solid var(--color-gold);
      color: var(--color-gold);
      border-radius: 8px;
      cursor: pointer;
      font-family: 'Cairo', sans-serif;
      font-weight: 700;
      transition: all 0.4s ease;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      margin-top: auto;
    }

    .btn-add:hover {
      background-position: right top;
      color: #000;
      box-shadow: 0 5px 15px rgba(212, 160, 23, 0.3);
    }

    /* Cart Floating Button */
    .cart-float {
      position: fixed;
      bottom: 30px;
      right: 30px;
      /* LTR (English) -> Right */
      left: auto;
      width: 60px;
      height: 60px;
      background: var(--color-gold);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 15px rgba(212, 160, 23, 0.4);
      z-index: 1000;
      border: none;
      cursor: pointer;
      color: #1A1A1A;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    [dir="rtl"] .cart-float {
      right: auto;
      left: 30px;
      /* RTL (Arabic) -> Left */
    }

    .cart-float:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 25px rgba(212, 160, 23, 0.6);
    }

    .cart-badge {
      position: absolute;
      top: -5px;
      right: -5px;
      background: #E74C3C;
      color: white;
      font-size: 0.8rem;
      font-weight: bold;
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid #1A1A1A;
    }

    /* Cart Modal */
    .cart-modal {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.8);
      z-index: 2000;
      display: flex;
      justify-content: flex-end;
      opacity: 0;
      visibility: hidden;
      transition: all 0.3s;
    }

    .cart-modal.active {
      opacity: 1;
      visibility: visible;
    }

    .cart-content {
      width: 100%;
      max-width: 450px;
      background: #1A1A1A;
      height: 100%;
      transform: translateX(100%);
      /* LTR default */
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      flex-direction: column;
      border-left: 1px solid rgba(212, 160, 23, 0.2);
    }

    [dir="rtl"] .cart-content {
      transform: translateX(-100%);
      border-left: none;
      border-right: 1px solid rgba(212, 160, 23, 0.2);
    }

    .cart-modal.active .cart-content {
      transform: translateX(0);
    }

    .cart-header {
      padding: 1.5rem;
      border-bottom: 1px solid rgba(212, 160, 23, 0.2);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* Mobile Bottom Sheet Styles */
    @media (max-width: 768px) {
      .cart-modal {
        align-items: flex-end;
        /* Align to bottom instead of right */
        justify-content: center;
      }

      .cart-content {
        max-width: 100%;
        height: 85vh;
        /* Take up 85% of screen height */
        border-radius: 20px 20px 0 0;
        /* Rounded top corners */
        transform: translateY(100%);
        /* Start off-screen at bottom */
        border-left: none;
        border-right: none;
        border-top: 1px solid rgba(212, 160, 23, 0.3);
      }

      [dir="rtl"] .cart-content {
        transform: translateY(100%);
        /* Override RTL horizontal transform */
      }

      .cart-modal.active .cart-content {
        transform: translateY(0);
        /* Slide up into view */
      }

      /* Optional: Add a little drag handle indicator */
      .cart-header::before {
        content: '';
        position: absolute;
        top: 10px;
        left: 50%;
        transform: translateX(-50%);
        width: 40px;
        height: 4px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 4px;
      }

      .cart-header {
        padding-top: 2rem;
        /* Make room for the handle */
        position: relative;
      }
    }

    .cart-header h2 {
      margin: 0;
      font-family: 'Cairo', sans-serif;
      color: var(--color-gold);
    }

    .close-cart {
      background: transparent;
      border: none;
      color: #fff;
      cursor: pointer;
    }

    .cart-items {
      flex-grow: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }

    .cart-item {
      display: flex;
      gap: 1rem;
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }

    .cart-item-img {
      width: 70px;
      height: 70px;
      background: #222;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
    }

    .cart-item-info {
      flex-grow: 1;
    }

    .cart-item-title {
      color: #fff;
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    .cart-item-price {
      color: var(--color-gold);
      font-weight: bold;
    }

    .cart-item-controls {
      display: flex;
      align-items: center;
      gap: 0.8rem;
      margin-top: 0.5rem;
    }

    .qty-btn {
      background: rgba(255, 255, 255, 0.1);
      border: none;
      color: #fff;
      width: 24px;
      height: 24px;
      border-radius: 4px;
      cursor: pointer;
    }

    .cart-footer {
      padding: 1.5rem;
      background: #111;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .cart-total-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 1.5rem;
      font-size: 1.2rem;
      color: #fff;
      font-weight: bold;
    }

    .checkout-form {
      display: none;
      margin-top: 1rem;
      animation: fadeIn 0.3s;
    }

    .checkout-form.active {
      display: block;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-input {
      width: 100%;
      padding: 0.8rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 6px;
      color: #fff;
      font-family: inherit;
    }

    .form-input:focus {
      border-color: var(--color-gold);
      outline: none;
    }

    .delivery-toggle {
      display: flex;
      gap: 1rem;
      margin-bottom: 1rem;
    }

    .toggle-btn {
      flex: 1;
      padding: 0.6rem;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: #aaa;
      border-radius: 6px;
      cursor: pointer;
    }

    .toggle-btn.active {
      background: var(--color-gold);
      color: #000;
      border-color: var(--color-gold);
    }

    .btn-action {
      width: 100%;
      padding: 1rem;
      background: var(--color-gold);
      color: #000;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      font-size: 1.1rem;
    }

    .coupon-section {
      margin-bottom: 1rem;
      display: flex;
      gap: 0.5rem;
    }

    .btn-apply {
      background: #333;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 0 1rem;
      cursor: pointer;
    }

    .success-message {
      text-align: center;
      padding: 2rem;
      color: #fff;
    }

    .success-icon {
      color: #2ECC71;
      margin-bottom: 1rem;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>

</head>

  <!-- Footer -->
  <footer>
    <div class="social-links" style="margin-bottom: 1.5rem; display: flex; justify-content: center; gap: 20px;">
      <a href="https://www.instagram.com/chicken_master26/" target="_blank" class="social-icon"><i
          data-lucide="instagram"></i></a>
      <a href="https://www.facebook.com/profile.php?id=61587454410215" target="_blank" class="social-icon"><i
          data-lucide="facebook"></i></a>
    </div>
    <p data-i18n="footer_text">&copy; 2026 تشيكن ماستر. جميع الحقوق محفوظة.</p>
  </footer>

  <script type="module" src="js/app.js"></script>
  <script type="module">
    // Re-initialize icons for dynamic content
    if (window.lucide) lucide.createIcons();

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      langManager.updateContent();
      checkShopStatus();
      loadMenu();

      // Re-load menu on language change
      window.addEventListener('languageChanged', loadMenu);
    });

    // Listen for updates from app.js
    window.addEventListener('shopStatusUpdated', (e) => {
      renderStatus(e.detail);
    });

    async function checkShopStatus() {
      // app.js might have already fetched it
      if (window.isShopStatusFetched && window.lastShopStatus) {
        renderStatus(window.lastShopStatus);
        return;
      } else {
        try {
          const response = await apiRequest('/shop/status');
          if (response.ok && response.data.success) {
            renderStatus(response.data); // Removed the extra .data
          }
        } catch (e) {
          console.error('Error checking status', e);
          // Fallback: Assume closed for safety if check fails completely.
          renderStatus({ is_open: false, message: 'نعتذر، حدث خطأ في الاتصال بالخادم والطلب غير متاح.' });
        }
      }
    }

    function renderStatus(data) {
      const menuSection = document.getElementById('menuSection');
      const closedSection = document.getElementById('shopClosedSection');
      const cartBtn = document.getElementById('cartBtn');
      const { is_open, message, opening_hours } = data;

      window.isShopOpen = is_open;

      // Determine Day Name
      const isAr = !window.langManager || window.langManager.getCurrentLang() === 'ar';
      const daysMapAr = {
        sunday: 'الأحد', monday: 'الإثنين', tuesday: 'الثلاثاء',
        wednesday: 'الأربعاء', thursday: 'الخميس', friday: 'الجمعة', saturday: 'السبت'
      };
      const todayKey = new Intl.DateTimeFormat('en-US', { weekday: 'long' }).format(new Date()).toLowerCase();

      if (opening_hours) {
        renderOpeningHours(opening_hours);
      }

      if (is_open) {
        if (menuSection) menuSection.style.display = 'block';
        if (closedSection) closedSection.style.display = 'none';
        if (cartBtn) cartBtn.style.display = 'flex';
      } else {
        if (menuSection) menuSection.style.display = 'block';
        if (closedSection) {
          closedSection.style.display = 'block';
          const msgEl = document.getElementById('closedMessage');
          if (msgEl) {
            if (isAr) {
              msgEl.textContent = `اليوم ${daysMapAr[todayKey]}: ${message}`;
            } else {
              const dayEn = todayKey.charAt(0).toUpperCase() + todayKey.slice(1);
              msgEl.textContent = `Today is ${dayEn}: ${message === 'نعتذر، المحل مغلق حالياً' ? 'Sorry, we are closed' : message}`;
            }
          }
        }
        if (cartBtn) cartBtn.style.display = 'none';
      }

      // Re-load menu to refresh buttons if already loaded
      // loadMenu(); // This might be too much, but needed to update buttons
    }

    function renderOpeningHours(hours) {
      const daysMap = {
        sunday: 'الأحد', monday: 'الإثنين', tuesday: 'الثلاثاء',
        wednesday: 'الأربعاء', thursday: 'الخميس', friday: 'الجمعة', saturday: 'السبت'
      };
      // Find today
      const todayKey = new Intl.DateTimeFormat('en-US', { weekday: 'long' }).format(new Date()).toLowerCase();
      const todayHours = hours[todayKey];

      // Update closed section hours text if exists
      const closedHoursP = document.querySelector('#shopClosedSection .hours-text');
      if (closedHoursP && todayHours) {
        if (todayHours.closed) closedHoursP.textContent = 'اليوم: مغلق';
        else closedHoursP.textContent = `اليوم: ${todayHours.open} - ${todayHours.close}`;
      }
    }

    async function loadMenu() {
      const menuContainer = document.getElementById('menuContainer');
      const tabsContainer = document.getElementById('categoryTabs');
      if (!menuContainer) return;

      try {
        const res = await apiRequest('/shop/menu');
        if (res.ok && res.data.success) {
          window.globalAddons = res.data.addons || [];
          const categories = res.data.data;
          const lang = langManager.getCurrentLang();

          if (categories.length === 0) {
            menuContainer.innerHTML = '<div style="text-align:center; padding: 2rem; color: #aaa;">قريباً...</div>';
            const menuSection = document.getElementById('menuSection');
            if (menuSection) menuSection.classList.add('menu-empty');
            return;
          }

          // Build Tabs
          const allWord = lang === 'ar' ? 'الكل' : 'All';
          let tabsHtml = `<button class="filter-tab active" data-cat="all">${allWord}</button>`;

          categories.forEach(cat => {
            if (cat.items.length > 0) {
              const catName = lang === 'ar' ? cat.name_ar : (cat.name_en || cat.name_ar);
              tabsHtml += `<button class="filter-tab" data-cat="cat-${cat.id}">${catName}</button>`;
            }
          });

          if (tabsContainer) {
            tabsContainer.innerHTML = tabsHtml;

            // Add tab click listeners
            document.querySelectorAll('.filter-tab').forEach(tab => {
              tab.addEventListener('click', function () {
                // Remove active class from all
                document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
                // Add active to clicked
                this.classList.add('active');

                const selectedCat = this.getAttribute('data-cat');
                filterMenu(document.getElementById('menuSearchInput').value, selectedCat);
              });
            });
          }

          // Build Menu Items
          menuContainer.innerHTML = categories.map(cat => {
            if (cat.items.length === 0) return '';

            return `
            <div class="menu-category" id="cat-${cat.id}">
                <h2 class="category-title" data-cat-name="${lang === 'ar' ? cat.name_ar : (cat.name_en || cat.name_ar).toLowerCase()}">${lang === 'ar' ? cat.name_ar : (cat.name_en || cat.name_ar)}</h2>
                <div class="menu-grid">
                    ${cat.items.map(item => {
              const isAvailable = item.is_available !== false;
              const hasDiscount = item.discount_price && parseFloat(item.discount_price) > 0 && parseFloat(item.discount_price) < parseFloat(item.price);
              const displayPrice = hasDiscount ? item.discount_price : item.price;

              const itemName = lang === 'ar' ? item.name_ar : (item.name_en || item.name_ar);
              const itemDesc = lang === 'ar' ? (item.description_ar || '') : (item.description_en || item.description_ar || '');

              const itemImageAlt = lang === 'ar' ? `وجبة ${item.name_ar} من منيو شيكن ماستر طولكرم` : `${item.name_en || item.name_ar} meal from Chicken Master Tulkarm menu`;
              return `
                        <div class="menu-item ${!isAvailable ? 'opacity-50 pointer-events-none' : ''}" data-name="${itemName.toLowerCase()}" data-desc="${itemDesc.toLowerCase()}">
                            <div class="item-image" style="background: ${item.image_url ? '#111' : 'linear-gradient(135deg, #1a1a1a, #2a2a2a)'}">
                                ${item.image_url ? `<img src="${item.image_url}" alt="${itemImageAlt}" style="width:100%; height:100%; object-fit:cover;">` : `<div style="text-align:center;"><i data-lucide="utensils" size="48" style="color: rgba(212,160,23,0.3); margin-bottom: 0.5rem;"></i><div style="font-family: 'Playfair Display', serif; color: rgba(255,255,255,0.2); font-size: 1.2rem;">Chicken Master</div></div>`}
                                ${!isAvailable ? '<div style="position:absolute; bottom:10px; right:10px; background:rgba(0,0,0,0.8); color:white; padding:5px 10px; border-radius:4px; font-weight:bold;">نفذت الكمية</div>' : ''}
                                ${hasDiscount ? '<div style="position:absolute; top:10px; left:10px; background:#e74c3c; color:white; padding:2px 8px; border-radius:4px; font-weight:bold; font-size:0.8rem;">عرض خاص</div>' : ''}
                            </div>
                            <div class="item-content">
                                <div class="item-header">
                                    <h3 class="item-title">${itemName}</h3>
                                </div>
                                <p class="item-desc">${itemDesc}</p>
                                
                                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; margin-top: auto;">
                                    <div>
                                      ${hasDiscount ? `
                                        <span style="font-size: 1rem; text-decoration: line-through; color: #777; margin-left: 5px;">${item.price} ₪</span>
                                        <span style="font-size: 1.2rem; font-weight: bold; color: #e74c3c;">${displayPrice} ₪</span>
                                      ` : `
                                        <span style="font-size: 1.2rem; font-weight: bold; color: var(--color-gold);">${displayPrice} ₪</span>
                                      `}
                                    </div>
                                </div>
                                
                                ${isAvailable && window.isShopOpen ? `
                                <button class="btn-add" onclick="window.openItemOptions('${item.id}', '${item.name_ar}', ${displayPrice}, '${item.image_url ? 'image' : 'utensils'}')">
                                    <span data-i18n="addToCart">أضف للسلة</span> <i data-lucide="shopping-bag" size="16"></i>
                                </button>
                                ` : `
                                <button class="btn-add" disabled style="background: #333; color: #777; border-color: #444; cursor: not-allowed;">
                                    <span>${!window.isShopOpen ? (lang === 'ar' ? 'المحل مغلق' : 'Shop Closed') : (lang === 'ar' ? 'غير متوفر' : 'Out of stock')}</span>
                                </button>
                                `}
                            </div>
                        </div>
                    `}).join('')}

                </div>
            </div>
            `;
          }).join('');

          lucide.createIcons();

          // Setup Search Listener
          const searchInput = document.getElementById('menuSearchInput');
          if (searchInput) {
            searchInput.addEventListener('input', function (e) {
              const activeTab = document.querySelector('.filter-tab.active');
              const currentCat = activeTab ? activeTab.getAttribute('data-cat') : 'all';
              filterMenu(e.target.value, currentCat);
            });
          }

        }
      } catch (e) {
        console.error('Menu load error', e);
      }
    }

    // Global Filter Function
    window.filterMenu = function (searchTerm = '', categoryId = 'all') {
      searchTerm = searchTerm.toLowerCase().trim();
      const categories = document.querySelectorAll('.menu-category');

      categories.forEach(cat => {
        // Check Category Match
        const catMatches = categoryId === 'all' || cat.id === categoryId;
        let hasVisibleItems = false;

        // Check items within category
        const items = cat.querySelectorAll('.menu-item');
        items.forEach(item => {
          const name = item.getAttribute('data-name');
          const desc = item.getAttribute('data-desc');

          const searchMatches = name.includes(searchTerm) || desc.includes(searchTerm);

          if (catMatches && searchMatches) {
            item.style.display = 'flex';
            hasVisibleItems = true;
          } else {
            item.style.display = 'none';
          }
        });

        // Show/hide entire category block based on contents
        if (hasVisibleItems && catMatches) {
          cat.style.display = 'block';
        } else {
          cat.style.display = 'none';
        }
      });
    }
  </script>
</body>

</html>
